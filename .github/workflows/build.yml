name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact_name: pinnow-mac-arm64.zip
          - os: windows-latest
            artifact_name: pinnow-windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Playwright dry-run (skip actual browser install)
        run: playwright install chromium --dry-run
        continue-on-error: true

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller pinnow.spec --noconfirm

      - name: Build (Windows)
        if: runner.os == 'Windows'
        # UPX 비활성화: 일부 antivirus 오탐 방지
        run: pyinstaller pinnow.spec --noconfirm

      - name: Sign app (macOS ad-hoc)
        if: runner.os == 'macOS'
        run: codesign --force --deep --sign - dist/pinnow.app

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/pinnow.app ${{ matrix.artifact_name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/pinnow/* -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: false
          body: |
            ## pinnow ${{ github.ref_name }}

            Pinterest 보드 및 핀 이미지 일괄 다운로더

            ### 이번 업데이트
            - macOS / Windows 앱 창 크기 고정 해제
            - 사용자가 앱 창을 직접 늘리거나 줄일 수 있도록 최소/최대 크기 범위 적용
            - 작은 높이에서는 UI가 겹치지 않고 세로 스크롤로 이어지도록 개선
            - `pinnow` 타이포가 창 크기와 플랫폼별 폰트 렌더링 차이로 잘리지 않도록 자동 크기 조정
            - 버튼, 진행바, verified pin 영역 간격 안정화

            ### 다운로드
            | 환경 | 파일 |
            |------|------|
            | macOS (Apple Silicon, Sequoia / Tahoe) | `pinnow-mac-arm64.zip` |
            | Windows (10 / 11, x64) | `pinnow-windows.zip` |

            ### 설치 방법
            **macOS**
            1. zip 압축 해제
            2. `pinnow.app` **우클릭 → 열기** (더블클릭 시 Gatekeeper 차단)
            3. 최초 실행 시 Chromium 자동 설치 (~150 MB, 1~2분)

            **Windows**
            1. zip 압축 해제 후 `pinnow` 폴더 안의 `pinnow.exe` 실행
            2. SmartScreen 경고 → **추가 정보 → 실행**
            3. 최초 실행 시 Chromium 자동 설치 (~150 MB, 1~2분)

            > macOS에서 "손상되었기 때문에 열 수 없음" 오류 시: 터미널에서 `xattr -cr /path/to/pinnow.app`
